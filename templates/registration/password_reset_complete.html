{% extends 'base.html' %}
{% block title %}Password Reset Complete | MW Solar{% endblock %}
{% block content %}
<div class="min-h-[85vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="max-w-md w-full space-y-8 glass-card p-10 rounded-3xl text-center" data-aos="zoom-in" data-aos-duration="800">
        <div class="w-16 h-16 rounded-full bg-emerald-500/20 border border-emerald-500/30 flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-check text-emerald-400 text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Password reset complete</h2>
        <p class="mt-2 text-sm text-gray-400">
            Your password has been set. You may go ahead and log in now.
        </p>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition-all shadow-lg shadow-blue-600/30">
                Log in
            </a>
        </div>
    </div>
</div>
{% endblock %}
